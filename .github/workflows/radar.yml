name: Radar de licitaciones (diario)

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC cada día. Ajusta a tu gusto.
  workflow_dispatch: {}    # botón para lanzarlo a mano

permissions:
  contents: write          # para commitear el docs/index.html actualizado

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar el radar
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Publicar resultado
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/
          git commit -m "Radar: actualización automática" || echo "Sin cambios"
          # git pull --rebase --autostash evita el conflicto que ya conoces del Gas Tracker
          git pull --rebase --autostash
          git push
